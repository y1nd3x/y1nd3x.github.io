<!doctype html><html lang=en><head><meta charset=UTF-8><meta name=viewport content="width=device-width,initial-scale=1"><title>Search - ⎡nd3x</title><link rel=icon href=data:,><link rel=preconnect href=https://lf3-cdn-tos.bytecdntp.com crossorigin><link rel=stylesheet href=https://lf3-cdn-tos.bytecdntp.com/cdn/expire-1-M/open-fonts/open-sans/open-sans.css><link rel=stylesheet href=https://lf3-cdn-tos.bytecdntp.com/cdn/expire-1-M/open-fonts/ubuntu/ubuntu.css><link rel=stylesheet href=../css/style.css></head><body><div class=container><main><h1 class=page-title><a href=../>Search</a></h1><div class=search-box><input type=text id=search-input placeholder="Enter keywords to search..." autocomplete=off><div id=search-results class=search-results></div></div></main><footer><p>&copy; 2026 <a href=../ class=back-link>⎡nd3x</a></p></footer></div><script id=search-index type=application/json>[{"content":"在 Windows 上开发使用 Git 时，经常会遇到 CRLF 与 LF 的冲突报错问题，解决办法如下：\nQuick Fix git config --global core.autocrlf input 提交时转 LF，拉取时不转换，并且配置保存在 .gitconfig 文件中便于备份恢复。\nFull Fix 在 Git Bash for Windows 中执行如下命令转换所有markdown文档：\nfind . -type f \\( -iname \u0026#34;*.md\u0026#34; -o -iname \u0026#34;*.markdown\u0026#34; \\) -exec dos2unix {} + 转换完成后，使用 file xxx.md 命令查看文件属性，输出包含 with CRLF line terminators表示还没改，输出仅显示 UTF-8 Unicode text表示已经是 LF 格式了。你可以运行以下命令来确认是否还有残留的 CRLF 文件。\nfind . -type f \\( -name \u0026#34;*.md\u0026#34; -o -name \u0026#34;*.markdown\u0026#34; \\) -exec file {} + | grep \u0026#34;CRLF\u0026#34; *IDE Config Ensure that all tools use LF line endings and UTF-8 (without BOM) encoding by default when creating and saving files.\n1. VS Code Shortcut: Ctrl + , (Comma) to open Settings. Line Endings: Search for files.eol and change the value from auto to \\n. Encoding: Search for files.encoding and ensure it is set to utf8. Auto Guess Encoding: Search for files.autoGuessEncoding and check the box for true (This helps prevent garbled text when opening older files). 2. Typora Path: File -\u0026gt; Preferences -\u0026gt; Editor. Line Endings: Change Default Line Ending to LF. Encoding: Ensure Default Encoding is set to UTF-8 (Note: In newer versions, this is the hardcoded default and the explicit option may be hidden). Status Bar: View -\u0026gt; Status Bar. (Once enabled, you can see and toggle between LF and CRLF in the bottom right corner of the window). 3. Notepad++ Path: Settings -\u0026gt; Preferences -\u0026gt; New Document. Line Endings: Under the Format section, select Unix (LF). Encoding: Select UTF-8 (Ensure \u0026ldquo;Apply to opened ANSI files\u0026rdquo; is unchecked if you want to keep it strictly UTF-8). Convert Existing Files: Edit -\u0026gt; EOL Conversion -\u0026gt; Unix (LF). ","href":"/posts/fixcrlfonwindows/","title":"修复Windows下换行符CRLF问题"},{"content":"1. 配置 Hugo 生成搜索索引 (JSON) 首先，你需要让 Hugo 在构建时输出一个 index.json 文件。\n修改你的 hugo.yaml (或 config.toml)：\nYAML\noutputs: home: - HTML - JSON # 开启首页的 JSON 输出 然后创建模板文件 layouts/_default/index.json：\n注意：这里只索引标题、标签和摘要，以平衡搜索准确度和文件体积。\nJSON\n[ {{- range $index, $page := .Site.RegularPages -}} {{- if $index -}},{{- end -}} { \u0026#34;title\u0026#34;: {{ $page.Title | jsonify }}, \u0026#34;permalink\u0026#34;: {{ $page.Permalink | jsonify }}, \u0026#34;tags\u0026#34;: {{ $page.Params.tags | jsonify }}, \u0026#34;content\u0026#34;: {{ $page.Plain | jsonify }} } {{- end -}} ] 2. 创建搜索页面模板 创建 layouts/_default/search.html。这里我们引入 FlexSearch 并编写中文优化的逻辑。\nHTML\n{{ define \u0026#34;main\u0026#34; }} \u0026lt;div class=\u0026#34;search-wrap\u0026#34;\u0026gt; \u0026lt;input type=\u0026#34;text\u0026#34; id=\u0026#34;search-input\u0026#34; placeholder=\u0026#34;输入关键词，支持中文精确搜索...\u0026#34; /\u0026gt; \u0026lt;div id=\u0026#34;search-results\u0026#34;\u0026gt;\u0026lt;/div\u0026gt; \u0026lt;/div\u0026gt; \u0026lt;!-- 引入 FlexSearch --\u0026gt; \u0026lt;script src=\u0026#34;https://cdn.jsdelivr.net/gh/nextapps-be/flexsearch@0.7.31/dist/flexsearch.bundle.js\u0026#34;\u0026gt;\u0026lt;/script\u0026gt; \u0026lt;script\u0026gt; // 1. 初始化 FlexSearch 索引 (中文优化配置) const index = new FlexSearch.Document({ tokenize: \u0026#34;forward\u0026#34;, // 针对中文建议使用 forward 或自定义 cache: true, document: { id: \u0026#34;id\u0026#34;, index: [\u0026#34;title\u0026#34;, \u0026#34;content\u0026#34;, \u0026#34;tags\u0026#34;], // 索引这些字段 store: [\u0026#34;title\u0026#34;, \u0026#34;permalink\u0026#34;] // 结果中直接返回这些字段 } }); const searchInput = document.getElementById(\u0026#39;search-input\u0026#39;); const resultsContainer = document.getElementById(\u0026#39;search-results\u0026#39;); // 2. 加载 Hugo 生成的 JSON 并建立索引 fetch(\u0026#39;/index.json\u0026#39;) .then(response =\u0026gt; response.json()) .then(data =\u0026gt; { data.forEach((doc, i) =\u0026gt; { index.add({ id: i, title: doc.title, content: doc.content, tags: doc.tags ? doc.tags.join(\u0026#39; \u0026#39;) : \u0026#39;\u0026#39; }); // 将原始数据存入内存以便渲染结果 window.searchData = data; }); console.log(\u0026#34;搜索索引已就绪\u0026#34;); }); // 3. 监听输入进行搜索 searchInput.addEventListener(\u0026#39;input\u0026#39;, function() { const query = this.value; resultsContainer.innerHTML = \u0026#39;\u0026#39;; if (query.length \u0026lt; 2) return; // 执行多字段搜索 const results = index.search(query, { limit: 10, enrich: true }); if (results.length \u0026gt; 0) { // 合并来自 title, content, tags 字段的搜索结果并去重 const allIndices = new Set(); results.forEach(res =\u0026gt; { res.result.forEach(r =\u0026gt; allIndices.add(r.id)); }); allIndices.forEach(id =\u0026gt; { const item = window.searchData[id]; const div = document.createElement(\u0026#39;div\u0026#39;); div.className = \u0026#39;search-result-item\u0026#39;; div.innerHTML = `\u0026lt;h4\u0026gt;\u0026lt;a href=\u0026#34;${item.permalink}\u0026#34;\u0026gt;${item.title}\u0026lt;/a\u0026gt;\u0026lt;/h4\u0026gt;`; resultsContainer.appendChild(div); }); } else { resultsContainer.innerHTML = \u0026#39;\u0026lt;p\u0026gt;未找到匹配结果\u0026lt;/p\u0026gt;\u0026#39;; } }); \u0026lt;/script\u0026gt; \u0026lt;style\u0026gt; /* 基础样式，你可以根据你的暗黑模式进行微调 */ .search-wrap { max-width: 700px; margin: 40px auto; } #search-input { width: 100%; padding: 12px; font-size: 18px; border: 2px solid #ddd; border-radius: 8px; } .search-result-item { padding: 15px 0; border-bottom: 1px solid #eee; } .search-result-item h4 { margin: 0; } .search-result-item a { color: #007bff; text-decoration: none; } \u0026lt;/style\u0026gt; {{ end }} 3. 为什么这个方案比 Pagefind 准确？ Tokenize 策略：在上面的配置中，我们使用了 tokenize: \u0026quot;forward\u0026quot;。对于中文来说，这意味着它会更智能地处理词头匹配。\n多字段权重：你可以通过 FlexSearch 分别搜索 title 和 content，并在展示时优先合并 title 的结果。\n完全掌控：Pagefind 是黑盒，而 FlexSearch 允许你通过 split 正则表达式自定义分词逻辑。如果觉得还不准，可以将 tokenize 改为：\nJavaScript\ntokenize: function(str){ return str.replace(/[\\x00-\\x7F]/g, \u0026#34; \u0026#34;).split(/\\s+/); } 这种方式会将中文字符拆解，实现极高密度的倒排索引，几乎能搜到任何包含的字。\n4. 配合你的暗黑模式 你之前提到过 CSS 的暗黑模式调试。对于 FlexSearch，由于 UI 是你自己写的，你可以完全控制：\nCSS\n@media (prefers-color-scheme: dark) { #search-input { background: #2d2d2d; color: #fff; border-color: #444; } .search-result-item a { color: #8ab4f8; } } 总结 Pagefind：适合文章极多（上千篇）、追求极致部署速度、对中文准确度要求适中的场景。 FlexSearch：适合对搜索结果有“洁癖”、希望中文匹配非常精准的博客。 由于你之前已经手动处理过 JSON 索引，这个方案对你来说应该更亲切。你现在可以尝试运行 hugo 生成项目，然后通过 index.json 看看 FlexSearch 的反馈。如果有字段匹配不到，我们可以调整 index.json 的字段结构。\n","href":"/posts/flexsearch/","title":"基于 FlexSearch 的 Hugo 集成案例"},{"content":"参数配置 在服务器上安装 Nginx 后，编辑配置文件（通常在 /etc/nginx/conf.d/hugo.conf 或 /etc/nginx/sites-available/default）\nserver { listen 80; server_name 192.168.1.100; # 你的服务器内网 IP location / { root /var/www/hugo; # hugo-\u0026gt;public files index index.html index.htm; # 即使是静态站点，建议加上这个，防止 Hugo 的某些路径出现 404 try_files $uri $uri/ =404; } # 可选：开启 Gzip 压缩，让网页加载更快 gzip on; gzip_types text/plain text/css application/javascript; } 部署步骤（最快流程） sudo mkdir -p /var/www/hugo\t##创建服务目录 scp -r ./public/* user@192.168.1.100:/var/www/hugo\t##拷贝网站文件 sudo chown -R www-data:www-data /var/www/hugo\t##确保 Nginx 权限正确 sudo nginx -t\t##检查配置语法是否正确 sudo systemctl restart nginx\t##重启服务 更新推送 在你的 Hugo 项目根目录下，执行以下命令即可将生成的静态文件推送到服务器\nPowerShell scp -r ./public/* your_user@192.168.1.100:/var/www/hugo -r\t#递归拷贝整个文件夹内容 ./public/*\t#只拷贝 public 文件夹内部的文件，而不拷贝 public 这个文件夹本身 your_user\t#你在服务器上的用户名（如 root 或其他用户） 为了不用每次都敲长命令，建议在项目根目录下创建一个名为 deploy.bat 的文件，内容如下\n@echo off echo [1/2] 正在清理并重新生成静态站点... hugo --cleanDestinationDir echo [2/2] 正在通过 SCP 推送到服务器... :: 请将下面的 root 修改为你服务器的用户名 scp -r ./public/* root@192.168.1.100:/var/www/hugo echo --------------------------------------- echo 部署完成！ pause 配置 SSH Key（免密登录） ​ 在 Windows 终端执行\nssh-keygen -t rsa（一路回车即可）\n​ 将公钥发送到服务器（最简单的方法）\ntype $env:USERPROFILE\\.ssh\\id_rsa.pub | ssh your_user@192.168.1.100 \u0026#34;cat \u0026gt;\u0026gt; ~/.ssh/authorized_keys\u0026#34; ","href":"/posts/nginxlocal/","title":"使用Nginx搭建简易本地Web服务器"},{"content":"Delete Recovery Partition disabled the recovery function via these command\nreagentc /info reagentc /disable then go to diskpart to delete recovery partition\nsel part 4 del part override exit Recreate Windows Recovery Partition go to diskpart to create recovery partition\nsel part 3 extend shrink minimum=900 create part primary format quick fs=ntfs label=\u0026#34;Recovery\u0026#34; set id=de94bba4-06d1-4d40-a16a-bfd50179d6ac ## set id=27 if using MBR on disk gpt attributes=0x8000000000000001 ## no need this line if using MBR exit copy winre.wim image file from your win iso to windows\\system32\\recovery directory\nmkdir c:\\tmpwim dism /mount-wim /wimfile:\u0026#34;d:\\sources\\install.wim\u0026#34; /index:1 /mountdir:\u0026#34;c:\\tmpwim\u0026#34; /readonly xcopy /s /e /h /y c:\\tmpwim\\Windows\\System32\\Recovery\\winre.wim C:\\windows\\system32\\Recovery dism /unmount-wim /mountdir:\u0026#34;c:\\tmpwim\u0026#34; /discard rd c:\\tmpwim then enable the recovery function\nreagentc /enable ## using F12 hotkey to boot Recovery env directly Reagentc /Setreimage /Path C:\\Recovery\\WindowsRE /bootkey 0x8600 ","href":"/posts/winrecoverypart/","title":"How to delete and recreate Win10/11 Recovery Partition"},{"content":"格式如下 https://calendars.icloud.com/holidays/{ISO 3166-1两位代码}_{ISO 639-1}.ics\n大陆节日 calendars.icloud.com/holidays/cn_zh.ics\n大陆节日英文 calendars.icloud.com/holidays/cn_en.ics\n台湾节日 calendars.icloud.com/holidays/tw_zh.ics\n香港节日 calendars.icloud.com/holidays/hk_zh.ics\n美国节日 calendars.icloud.com/holidays/us_en.ics\n国内节假日调休补班日历 https://github.com/lanceliao/china-holiday-calender\nhttps://www.shuyz.com/githubfiles/china-holiday-calender/master/holidayCal.ics\nhttps://cdn.jsdelivr.net/gh/lanceliao/china-holiday-calender/holidayCal.ics\n","href":"/posts/calendars/","title":"iPhone Calendars"},{"content":"https://blog.erben.sk/2014/02/06/country-cidr-ip-ranges/\n/tool fetch url=http://www.iwik.org/ipcountry/mikrotik/cn /import file-name=CN ","href":"/posts/cidronmikrotik/","title":"Country CIDR IP ranges on Mikrotik"},{"content":"Modify syslinux.cfg\nUpdate: A potential workaround - some users are reporting success with the following workaround, add iommu=pt to the append line of your syslinux.conf file on your boot flash.\nExample - change this\nappend initrd=/bzroot To this\nappend iommu=pt initrd=/bzroot Also, try updating to the latest firmware for the card, no guarantees but it may help.\nappend amd_iommu=on iommu=pt initrd=/bzroot ","href":"/posts/unraidonamd/","title":"Unraid on AMD HPE Gen10 Marvell 88SE9230"},{"content":" 下载安装IDM，添加如下下载类型（M4S, XS）\n然后启动chrome浏览器插件\n下载b站视频和音频一共两个文件，然后下载安装ffmpeg后执行如下命令\nffmpeg -i video.m4s -i audio.m4a -c copy final.mp4 # -i 指定输入文件 # -c copy 表示使用复制编码，不进行转码 # final.mp4表示输出文件 ffmpeg合并多个MP4视频文件\nffmpeg -i 1.mp4 -i 2.mp4 -filter_complex \u0026#34;[0:v][0:a][1:v][1:a]concat=n=2:v=1:a=1[v][a]\u0026#34; -map \u0026#34;[v]\u0026#34; -map \u0026#34;[a]\u0026#34; final.mp4 # -i 1.mp4 -i 2.mp4 指定多个输入文件 # -filter_complex 启用复杂过滤器 # [0:v][0:a][1:v][1:a] 分别引用每个输入文件的视频流 (v) 和音频流 (a) # concat=n=2:v=1:a=1 指定合并2个文件，每个文件包含1个视频流和1个音频流 # [v][a] 合并后的视频流和音频流 # -map \u0026#34;[v]\u0026#34; -map \u0026#34;[a]\u0026#34; 将合并后的视频和音频流映射到输出文件 # final.mp4：输出的合并文件 ffmpeg.bat\n@echo off cls TITLE ffmpeg-combine-script :topmenu echo. echo Input number to choose, hit Enter to quit: echo ========================================== echo 1. combine video+audio echo 2. combine 1.video+2.video echo 3. convert audio echo ========================================== echo. set /p _input=Please enter number: || Set _input=NothingChosen If \u0026#34;%_input%\u0026#34;==\u0026#34;NothingChosen\u0026#34; goto exit If /i \u0026#34;%_input%\u0026#34;==\u0026#34;1\u0026#34; goto sub_1 If /i \u0026#34;%_input%\u0026#34;==\u0026#34;2\u0026#34; goto sub_2 If /i \u0026#34;%_input%\u0026#34;==\u0026#34;3\u0026#34; goto sub_3 echo Please type a valid number (1 ~ 3) goto:topmenu :sub_1 cls ffmpeg -i 1.mp4 -i 2.m4a -c copy final.mp4 ffmpeg -i 1.mp4 -i 2.mp4 -c copy final.mp4 goto:topmenu :sub_2 cls ffmpeg -i 1.mp4 -i 2.mp4 -filter_complex \u0026#34;[0:v][0:a][1:v][1:a]concat=n=2:v=1:a=1[v][a]\u0026#34; -map \u0026#34;[v]\u0026#34; -map \u0026#34;[a]\u0026#34; final.mp4 goto:topmenu :sub_3 cls ffmpeg -i 1.aac -codec copy final.m4a ffmpeg -i 1.m4a -codec copy final.m4a ::FOR %F IN (*.m4a) DO ffmpeg -i \u0026#34;%F\u0026#34; -codec copy \u0026#34;%~nF.m4a\u0026#34; goto:topmenu ","href":"/posts/idm2bili/","title":"IDM download bilibili"},{"content":"Update for Office 2016 (KB5002623) https://support.microsoft.com/en-us/topic/april-10-2025-update-for-office-2016-kb5002623-d60c1f31-bb7c-4426-b8f4-69186d7fc1e5\nhttps://learn.microsoft.com/en-us/officeupdates/office-updates-msi#office-2016-updates\n","href":"/posts/itpatches/","title":"IT Patches News"},{"content":"https://massgrave.dev/windows_ltsc_links.html\nRestore.bat\n@echo off robocopy \u0026#34;.ssh\u0026#34; \u0026#34;%USERPROFILE%\\.ssh\u0026#34; /MIR /DCOPY:DAT /IT /MT /R:2 /W:2 robocopy .\\ \u0026#34;%USERPROFILE%\u0026#34; \u0026#34;.gitconfig\u0026#34; /DCOPY:DAT /IT /MT /R:2 /W:2 robocopy \u0026#34;Desktop\u0026#34; \u0026#34;%USERPROFILE%\\Desktop\u0026#34; /MIR /DCOPY:DAT /IT /MT /r:2 /w:2 robocopy \u0026#34;Shortcuts\u0026#34; \u0026#34;%AppData%\\Microsoft\\Windows\\Start Menu\\Programs\u0026#34; /DCOPY:DAT /IT /MT /R:2 /W:2 ::robocopy \u0026#34;Shortcuts\u0026#34; \u0026#34;%ProgramData%\\Microsoft\\Windows\\Start Menu\\Programs\u0026#34; \u0026#34;*.lnk\u0026#34; /DCOPY:DAT /IT /MT /R:2 /W:2 ::backup pintaskbar ::robocopy \u0026#34;%AppData%\\Microsoft\\Internet Explorer\\Quick Launch\\User Pinned\\TaskBar\u0026#34; \u0026#34;PinTaskbar\u0026#34; /DCOPY:DAT /IT /MT /R:2 /W:2 ::reg export HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\Explorer\\Taskband C:\\pintaskbar.reg robocopy \u0026#34;PinTaskbar\u0026#34; \u0026#34;%AppData%\\Microsoft\\Internet Explorer\\Quick Launch\\User Pinned\\TaskBar\u0026#34; /DCOPY:DAT /IT /MT /R:2 /W:2 reg import pintaskbar.reg ::Log off and log back in and the icons should be pinned to your taskbar. taskkill /f /im explorer.exe start explorer.exe pause CleanTemp.bat\n\u0026lt;# : Begin batch (batch script is in commentary of powershell v2.0+) @echo off : Use local variables setlocal : Change current directory to script location - useful for including .ps1 files cd %~dp0 : Invoke this file as powershell expression powershell -executionpolicy remotesigned -Command \u0026#34;Invoke-Expression $([System.IO.File]::ReadAllText(\u0026#39;%~f0\u0026#39;))\u0026#34; : Restore environment variables present before setlocal and restore current directory endlocal : End batch - go to end of file goto:eof #\u0026gt; # here start your powershell script # example: include another .ps1 scripts (commented, for quick copy-paste and test run) #. \u0026#34;.\\anotherScript.ps1\u0026#34; # example: standard input from console $objShell = New-Object -ComObject Shell.Application $objFolder = $objShell.Namespace(0xA) # 1. Empty Recycle Bin Write-Host \u0026#34;Emptying Recycle Bin\u0026#34; -ForegroundColor Yellow $objFolder.items() | %{ Remove-Item $_.path -Recurse -Force -Confirm:$false} # 2. Remove Temp Write-Host \u0026#34;Removing Temp\u0026#34; -ForegroundColor Yellow Set-Location \u0026#34;C:\\Windows\\Temp\u0026#34; Remove-Item * -Recurse -Force -ErrorAction SilentlyContinue Set-Location \u0026#34;C:\\Windows\\Prefetch\u0026#34; Remove-Item * -Recurse -Force -ErrorAction SilentlyContinue Set-Location \u0026#34;C:\\Windows\\SoftwareDistribution\u0026#34; Remove-Item * -Recurse -Force -ErrorAction SilentlyContinue Set-Location \u0026#34;C:\\Documents and Settings\u0026#34; Remove-Item \u0026#34;.\\*\\Local Settings\\temp\\*\u0026#34; -Recurse -Force -ErrorAction SilentlyContinue Set-Location \u0026#34;C:\\Users\u0026#34; Remove-Item \u0026#34;.\\*\\Appdata\\Local\\Temp\\*\u0026#34; -Recurse -Force -ErrorAction SilentlyContinue # 3. Remove History Write-Host \u0026#34;Removing History\u0026#34; -ForegroundColor Yellow Remove-Item -Path \u0026#34;$env:APPDATA\\Microsoft\\Windows\\Recent\\*.lnk\u0026#34; -Recurse -Force Remove-Item -Path \u0026#34;$env:APPDATA\\Microsoft\\Windows\\Recent\\AutomaticDestinations\\*\u0026#34; -Recurse -Force Remove-Item -Path \u0026#34;$env:APPDATA\\Microsoft\\Windows\\Recent\\CustomDestinations\\*\u0026#34; -Recurse -Force REG Delete HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Explorer\\RunMRU /VA /F REG Delete HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Explorer\\TypedPaths /VA /F # 4. Running Cleanmgr Write-Host \u0026#34;Running Cleanmgr...\u0026#34; -ForegroundColor Yellow # cleanmgr /D $Env:SystemDrive /lowdisk | out-Null # $([char]7) # sleep 1 # Write-Host \u0026#34;It\u0026#39;s done.\u0026#34; -ForegroundColor Yellow # sleep 2 Get-ItemProperty -Path \u0026#39;HKLM:\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Explorer\\VolumeCaches\\*\u0026#39; | % { New-ItemProperty -Path $_.PSPath -Name StateFlags0001 -Value 2 -PropertyType DWord -Force }; Remove-ItemProperty -Path \u0026#39;HKLM:\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Explorer\\VolumeCaches\\DownloadsFolder\u0026#39; -Name \u0026#34;StateFlags0001\u0026#34; -Force Start-Process -FilePath CleanMgr.exe -ArgumentList \u0026#34;/sagerun:1 /D $env:SystemDrive\u0026#34; https://stackoverflow.com/questions/6037146/how-to-execute-powershell-commands-from-a-batch-file/41986771#41986771\nbackup and import drivers.bat\ndism /online /Export-Driver /Destination:D:\\driverbackup pnputil /add-driver D:\\driverbackup\\*.inf /subdirs /install :: dism /offline /Add-Driver /Driver:D:\\driverbackup /Recurse installdrivers.bat\n@echo off CD /d %~dp0 pnputil /add-driver .\\*.inf /subdirs /install exit install-IME-win11.bat\n@echo off dism /online /add-package /packagepath:Microsoft-Windows-LanguageFeatures-Basic-zh-cn-Package~31bf3856ad364e35~amd64~~.cab pause. bookmarks\ncurl checkip.amazonaws.com\ncurl ipinfo.io\nhttps://librespeed.org/\nhttps://test.nju.edu.cn/\nhttps://www.testufo.com/\nhttps://cps-check.com/cn/test-keyboard\nUnlock TDP or Power Limit on Motherboard asus Ai Tweaker -\u0026gt; Internal CPU Power Management\nAi Tweaker -\u0026gt; Actual VRM Core Voltage\nAi Tweaker -\u0026gt; Global Core SVID Voltage\nAi Tweaker -\u0026gt; Cache SVID Voltage\nAi Tweaker -\u0026gt; Tweaker’s Paradise\nHow to turn on your computer automatically by setting BIOS (asus) https://www.asus.com/support/faq/1043640/\nAfter you turn on the power of computer, press the Delete or F2 key on the keyboard immediately to enter BIOS EZ Mode, Then press F7 to enter Advanced Mode as below Click Advanced - APM Configuration, as below Make sure Erp ready is Disabled as below (ErP is Products\u0026rsquo; energy efficiency requirements of Energy-related Products in Europe) Change Power on By RTC to Enabled as below Set Day and Time that you want to wake up the device. If you want motherboard to be powered on at 08:30 everyday, please set as below (Wake up date: 0 stands for every day, 1 stands for 1st day of the month, 2 stands for 2nd day of the month\u0026hellip;31 is the 31st of the month) Press F10, and it will show the time that you set. Please confirm if it is the same as what you want. If it\u0026rsquo;s correct, please click OK to save changes and reset at once. Disable Turn on fast startup, then click Save changes. Finish the above steps, you can make your motherboard power on automatically by BIOS RTC ","href":"/posts/pcdiy/","title":"PC DIY"},{"content":"https://60s.lylme.com/\nhttps://60s.coom.cn/\nhttps://chromeenterprise.google/intl/en_GB/\nhttps://gohugo.io/getting-started/quick-start/\nhttps://codepen.io/\n赵翼 《论诗五首·其二》 李杜诗篇万口传，至今已觉不新鲜。 江山代有才人出，各领风骚数百年。\ngraph LR A([Oooh]) --\u0026gt; B([Would You]) B --\u0026gt; C([Look at This]) C --\u0026gt; D[Very] C --\u0026gt; E[Fancy] C --\u0026gt; F[Flowchart] $$ \\int_{-\\infty}^{\\infty} e^{-x^2} dx \\sum_{i = 0}^N 2i = y $$\n","href":"/about/","title":"About"},{"content":"Boot into Windows PE from win-usb installer, then assign a letter to EFI partition and format it, then recreate bcdboot-entry.\ndiskpart list disk sel disk 0 list vol sel vol 2 detail part assign letter=U exit format U: /Q /fs:fat32 /V:EFI bcdboot C:\\Windows /s U: /f UEFI Then reboot and it works.\nIf you want to reuse recovery function, use this command\nreagentc /enable use bcdedit to show current bcdentry\nRepair Dual-boot (Multi-boot) Configuration (Windows and Linux) https://superuser.com/questions/892281/installing-windows-update-3033929\nBoth Windows and Linux are installed on same disk In this case you must replace the bootloader by that of Windows, let this update install itself, then return GRUB. The steps are as follows :\nBoot from the Windows installation media and choose the Command Prompt repair option.\nType the following and press Enter:\nBootrec.exe /FixBoot Bootrec.exe /FixMbr Reboot straight into Windows (Grub is no longer there).\nTo get GRUB back, boot computer into a live Linux CD or USB and choose to \u0026ldquo;try\u0026rdquo; the OS.\nFind out on which partition Linux is installed, perhaps by using the Gparted utility to find the root \u0026ldquo;/\u0026rdquo; partition. Let’s assume this is on sda1.\nTo mount that partition. Open a terminal and type and press Enter:\nsudo mount /dev/sda1 /mnt Reinstall grub with the following command:\nsudo grub-install /dev/sda –root-directory=/mnt Remove the installation media and reboot. The Grub bootloader will only show the Linux installation.\nTo fix this, boot to the Linux desktop, open a terminal and run this command for it to pick up all available OS on the machine:\nsudo update-grub Reboot and you should now have Grub functioning and your Windows install as a bootable option.\n","href":"/posts/fixwinboot/","title":"How to fix Windows 10/11 UEFI boot issues"},{"content":"肝：李子\n心：杏\n肺：梨\n脾：枣类、红枣\n肾：坚果、栗子\n推荐吃饭顺序：菜—\u0026gt;肉—\u0026gt;饭\n芝麻粥 材料：芝麻50g、粳米100g、蜂蜜50g。\n做法：将粳米与芝麻分别洗净。放入锅内，加清水、用小火熬成粥，调入蜂蜜拌匀即成，每日一次。\n功效：补肝肾、润五脏，益气力。\n适用于肝肾阴虚、须发早白、身体虚弱、头晕目眩、贫血、腰膝酸软、四肢麻木等。\n海参 材料：水发海参1000克、清汤250克、油菜心2棵、料酒9克、湿玉米粉9克、熟猪油45克、葱120克、油、味精、食盐。\n做法：将水发海参洗净，用开水氽一下，用熟猪油将葱段炸黄，制成葱油海参下锅，加入清汤100克和酱油、味精、食盐、料酒，用微火炖烂。将海参捞出，放入大盘内，原汤不用。将菜心放在海参上。锅内放清汤150克，再加入酱油、味精、食盐、料酒等调料，用湿玉米粉勾芡，浇在海参、菜心上，淋上葱油60克即成。\n功效：滋肺补肾，益精壮阳。肾阴虚的阳痿、遗精。\n","href":"/posts/foodrecipe/","title":"菜谱"},{"content":"https://unix.stackexchange.com/questions/99535/print-command-instead-of-echo-in-linux\nI simply can print a message in terminal using linux echo command.\nprayag@prayag$ echo \u0026#34;prayag works on JVM\u0026#34; prayag works on JVM Can I have the same output with print command.\nI actually went through their manuals, where $ man print describes it as Run-mailcap-programs which term I never heard before. And came to know that it is used to find the correct program to open a file with, based on MIME.\nSo is there any way to print a simple line using print alone instead of echo?\nFound similar kind of problem at Need to assign the contents of a text file to a variable in a bash script, but people suggesting echo over print there.\nI tried following, but got issues.\n$ print --\u0026#34;text/plain\u0026#34; \u0026#34;prayag works on JVM\u0026#34; Warning: unknown mime-type for \u0026#34;prayag works on JVM\u0026#34; -- using \u0026#34;application/octet-stream\u0026#34; Error: no such file \u0026#34;prayag works on JVM\u0026#34; It asks for a file, with file provided.\n$ print --\u0026#34;text/plain\u0026#34; application.properties Warning: unknown mime-type for \u0026#34;application.properties\u0026#34; -- using \u0026#34;application/octet-stream\u0026#34; Error: no \u0026#34;print\u0026#34; mailcap rules found for type \u0026#34;application/octet-stream\u0026#34; But got working in combination with awk command with a file provided,\n$ awk \u0026#39;{print}\u0026#39; application.properties prayag works on JVM Similar issue: https://stackoverflow.com/questions/10576571/how-to-make-echo-interpret-backslash-escapes-and-not-print-a-trailing-newline You\u0026rsquo;re confusing many things here, let me try and tease this apart for you.\nawk '{print}' ...\nThis has nothing to do with the print you\u0026rsquo;re asking about. awk is a dynamic programming language which contains its own commands, of which print is one of them.\nprint --\u0026quot;text/plain\u0026quot; \u0026quot;prayag works on JVM\u0026quot; and other forms\nThe command print is for displaying files per the contents of the mailcap file, using the designated \u0026ldquo;handler\u0026rdquo; for each particular file type, not for printing strings to the screen.\nexcerpt from the print man page\nrun-mailcap, view, see, edit, compose, print - execute programs via entries in the mailcap file\nrun-mailcap (or any of its aliases) will use the given action to process each mime-type/file in turn. Each file is spec‐ ified as its mime-type, its encoding (e.g. compression), and filename together, separated by colons. If the mime-type is omitted, an attempt to determine the type is made by trying to match the file\u0026rsquo;s extension with those in the mime.types files. If the encoding is omitted, it will also be determined from the file\u0026rsquo;s extensions. Currently supported encodings are gzip (.gz), bzip (.bz), bzip2 (.bz2), and compress (.Z). A filename of \u0026ldquo;-\u0026rdquo; can be used to mean \u0026ldquo;standard input\u0026rdquo;, but then a mime-type must be specified.\necho\nThe command echo is a builtin command to the shell you\u0026rsquo;re using called Bash (I\u0026rsquo;m assuming you\u0026rsquo;re using Bash). You can confirm this by using this command:\n$ type -a echo echo is a shell builtin echo is /bin/echo You\u0026rsquo;ll notice that echo is also a standalone executable, /bin/echo. This is a different command than the echo you\u0026rsquo;re using, but serves a similar purpose.\nprint in shells such as zsh/ksh\nThanks to @Gilles comment, the print command you\u0026rsquo;re looking for is most likely the one that is built into shells such as zsh and/or ksh. You can see its usage through the man page, man zshbuiltins.\nExample zsh % print \u0026#34;hello world\u0026#34; hello world You can run one of these shells by typing zsh or ksh.\nprintf Perhaps you\u0026rsquo;re looking for the command printf?\n$ printf \u0026#34;%s\\n\u0026#34; \u0026#34;hello stringy world\u0026#34; hello stringy world $ printf \u0026#34;this is some padded digits: %04d\\n\u0026#34; \u0026#34;10\u0026#34; this is some padded digits: 0010 The command printf takes a formatting set of special characters so that you can instruct it how you want to display things such as strings or digits etc. See the man page for printf.\nmailcap So a lot of people are probably oblivious as to the file /etc/mailcap. This file contains mime-types (headers from files which identifies what type of file a file is). You can then create entries in this mailcap file which designate what tool to use to open a particular mime-type for a file.\nExample text/html; /usr/bin/sensible-browser \u0026#39;%s\u0026#39;; description=HTML Text; nametemplate=%s.html application/x-troff-man; /usr/bin/nroff -mandoc -Tutf8; copiousoutput; print=/usr/bin/nroff -mandoc -Tutf8 | print text/plain:- application/x-ogg; /usr/bin/mplayer \u0026#39;%s\u0026#39;; description=\u0026#34;OggVorbis Audio\u0026#34; application/ogg; /usr/bin/mplayer \u0026#39;%s\u0026#39;; description=\u0026#34;OggVorbis Audio\u0026#34; audio/mpeg; /usr/bin/mplayer \u0026#39;%s\u0026#39;; description=\u0026#34;MPEG Audio Format\u0026#34; audio/x-mpegurl; /usr/bin/mplayer \u0026#39;%s\u0026#39;; description=\u0026#34;Icecast Playlists\u0026#34; audio/x-ms-wax; /usr/bin/mplayer \u0026#39;%s\u0026#39;; description=\u0026#34;Audio Format\u0026#34; The above lines say that if you get a file with the mime-type audio/mpeg, then use the tool /usr/bin/mplayer to open this file.\nThese rules are generally used by the email tool, but other tools can take advantage of these entries within the mailcap file as well.\nIf you\u0026rsquo;re interested in learning more about mime-types or mailcap see the following references.\nReferences Internet media type Mailcap ","href":"/posts/printecho/","title":"print command instead of echo in linux"},{"content":"https://superuser.com/questions/1257859/remove-an-unused-hidden-network-connection-so-that-an-existing-name-can-be-reuse\nFor wired connection:\nType the command\nnetsh lan show profiles, press Enter to obtain all wired network profiles.\nnetsh lan delete profile name=\u0026quot;WiredProfileName\u0026quot;\nFor wireless connection:\nType the command\nnetsh wlan show profiles\nnetsh wlan delete profile name=\u0026quot;WirelessProfileName\u0026quot;\nBesides that, go into the following registry entryL\nHKEY_LOCAL_MACHINE\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\NetworkList\\Profiles\nFind those unused network profile by right pane profile name, delete them(GUID).\nshow wifi.bat\n@echo off setlocal enabledelayedexpansion for /F \u0026#34;tokens=2 delims=:\u0026#34; %%a in (\u0026#39;netsh wlan show profile\u0026#39;) do ( set wifi_pwd= for /F \u0026#34;tokens=2 delims=: usebackq\u0026#34; %%F IN (`netsh wlan show profile %%a key^=clear ^| find \u0026#34;Key Content\u0026#34;`) do ( set wifi_pwd=%%F ) echo %%a : !wifi_pwd! ) ","href":"/posts/removehiddenetworkprofile/","title":"Remove unused or hidden WiFi profile"},{"content":"https://serverfault.com/questions/179200/difference-beetween-dnat-and-redirect-in-iptables\nOkay, it may be because I am dense or maybe just not finding the right source, but I can\u0026rsquo;t understand why one of these IPTABLES setups would be better than the other.\nHere is my setup:\nI have a box that is serving as a transparent proxy and a router or sorts. It has two interfaces on it, ETH0 and ETH1, and the following address scheme:\nETH0 = DHCP ETH1 = 192.168.5.1/24 serving up DHCP for the 192.168.5.0/24 network to clients behind it in the LAN\nI have privoxy installed and listening on port 8080 as a transparent proxy. What I am accomplishing with this setup is to be able to drop this box into an existing network with minimal configuration and attached clients to the proxy.\nHere is my original IPTABLES file\n*nat -A PREROUTING -i eth1 -p tcp -m tcp --dport 80 -j REDIRECT --to-port 8080 -A POSTROUTING -o eth0 -j MASQUERADE COMMIT *filter COMMIT This configuration works fine and traffic is flowing back and forth without issue. I get the originating clients IP address in the privoxy logfiles, and life is good.\nMy confusion comes in when I start looking at other people\u0026rsquo;s configurations and see that they are using DNAT instead of REDIRECT, and I am trying to understand the real beneift of one over the other. Here is a sample config:\n*nat -A PREROUTING -i eth1 -p tcp -m tcp --dport 80 -j DNAT --to 192.168.5.1:8080 -A POSTROUTING -o eth0 -j MASQUERADE COMMIT *filter COMMIT Again, this configuration works too, and gives me all I need from a logging perspective\u0026hellip;\nWhich is is right, or maybe MORE right, than the other one?\nThanks for taking time to read this far\u0026hellip;\nAnswer:\nDNAT and REDIRECT are exactly the same, if you want to send traffic to the local machine.\nThe documentation states it like so: \u0026ldquo;[Redirection] is a specialized case of Destination NAT called redirection: it is a simple convenience which is exactly equivalent to doing DNAT to the address of the incoming interface.\u0026rdquo;\nhttps://www.netfilter.org/documentation/HOWTO/NAT-HOWTO-6.html#ss6.2\n","href":"/posts/diffdnatredirect/","title":"Difference between DNAT and REDIRECT in IPTABLES"},{"content":"https://superuser.com/questions/499078/refresh-icon-cache-without-rebooting\nYou can just run the following command to clear the icon cache: ie4uinit.exe -ClearIconCache ::for Windows 10 ie4uinit.exe -show Create a .bat file and paste the following lines in it and then run it. taskkill /f /im explorer.exe cd /d %userprofile%\\AppData\\Local del IconCache.db /a start explorer.exe If you don\u0026rsquo;t want to make a .bat, copy the line behind, press Win+R, paste it and press Enter. cmd /c taskkill /f /im explorer.exe \u0026amp; del /a %userprofile%\\AppData\\Local\\IconCache.db \u0026amp; start explorer ","href":"/posts/winiconcache/","title":"Refresh Windows Icon Cache Without Rebooting"},{"content":" folder -\u0026gt; properties -\u0026gt; sharing -\u0026gt; advanced sharing -\u0026gt; permissions folder -\u0026gt; properties -\u0026gt; security -\u0026gt; edit folder -\u0026gt; properties -\u0026gt; security -\u0026gt; advanced -\u0026gt; replace all child object permission entries with inheritable permission entries from this object ","href":"/posts/winsharespermission/","title":"Windows folder sharing permission settings"},{"content":"\n","href":"/posts/diffraidjbodspan/","title":"Difference between raid jbod and spanning"},{"content":" setup /admin change -\u0026gt; Licensing and user interface (check I accept the terms in the License Agreement, choose Display level -\u0026gt; Basic, check Completion notice) -\u0026gt; Modify Setup properties (Add -\u0026gt; SETUP_REBOOT - Never) -\u0026gt; Set feature installation states (uncheck you dont want to install) -\u0026gt; Configure shortcuts (Remove you dont want to install) choose File -\u0026gt; Save as run.MSP file create a install bath with @echo off cd /d %~dp0 echo. echo Installing Office, please wait... echo. setup.exe /adminfile run.MSP exit Download the Update for Microsoft Office 2016 32-Bit Edition from here.\nhttps://learn.microsoft.com/en-us/officeupdates/office-updates-msi#office-2016-updates\nTo extract the .msp patches from the Microsoft Self-Extractor file (msodll40ui2016-kb5002469-fullfile-x86-glb.exe in this example), run the .exe file and use the /extract switch. For example, type the following at the command prompt:\nmsodll40ui2016-kb5002469-fullfile-x86-glb.exe /extract:C:\\ExtractUpdates Then copy all the Windows Installer patch (.msp) files in that folder to the Office Updates folder.\n","href":"/posts/officeoct/","title":"Office 2016 customization tool silent install and integrating updates"},{"content":"mycfg globally PATH or environment variables on Unix/Linux # on Linux /etc/environment # on Unix/BSD /etc/paths conky.conf conky.config = { background = true, update_interval = 2, cpu_avg_samples = 2, net_avg_samples = 2, out_to_console = false, override_utf8_locale = true, double_buffer = true, no_buffers = true, text_buffer_size = 32768, imlib_cache_size = 0, own_window = true, own_window_type = \u0026#39;dock\u0026#39;, own_window_argb_visual = true, own_window_argb_value = 50, own_window_hints = \u0026#39;undecorated,below,sticky,skip_taskbar,skip_pager\u0026#39;, border_inner_margin = 10, border_outer_margin = 0, xinerama_head = 1, alignment = \u0026#39;top_right\u0026#39;, gap_x = 30, gap_y = 60, draw_shades = false, draw_outline = false, draw_borders = false, draw_graph_borders = false, use_xft = true, font = \u0026#39;Ubuntu Mono:size=12\u0026#39;, xftalpha = 0.8, uppercase = false, default_color = \u0026#39;white\u0026#39;, own_window_colour = \u0026#39;#000000\u0026#39;, minimum_width = 300, minimum_height = 500, alignment = \u0026#39;top_right\u0026#39;, } conky.text = [[ #${time %H:%M}$alignr${time %d-%m-%y} ${voffset -16}${font sans-serif:bold:size=18}${alignc}${time %H:%M}${font} ${voffset 4}${alignc}${time %Y.%m.%d} ${font}${voffset -4} ${font sans-serif:bold:size=10}SYSTEM ${hr 2} ${font sans-serif:normal:size=8}$sysname $kernel $alignr $machine Uptime:$alignr$uptime Host:$alignr$nodename IP:$alignr${execi 1000 ip a | grep inet | grep -vw lo | grep -v inet6 | cut -d \\/ -f1 | sed \u0026#39;s/[^0-9\\.]*//g\u0026#39;} #File System: $alignr ${fs_type} #Processes: $alignr ${execi 1000 ps aux | wc -l} ${font sans-serif:bold:size=10}CPU ${hr 2} ${font sans-serif:normal:size=8} ${execi 1000 grep model /proc/cpuinfo | cut -d : -f2 | tail -1 | sed \u0026#39;s/\\s//\u0026#39;} ${cpugraph cpu1} $alignr ${cpu cpu1}% ${cpubar cpu1} ${font sans-serif:bold:size=10}MEMORY ${hr 2} ${font sans-serif:normal:size=8}RAM $alignc $mem / $memmax $alignr $memperc% $membar SWAP $alignc ${swap} / ${swapmax} $alignr ${swapperc}% ${swapbar} ${font sans-serif:bold:size=10}DISK USAGE ${hr 2} ${font sans-serif:normal:size=8}Read: ${diskio_read}$alignr Write: ${diskio_write} ${diskiograph_read 30,100}$alignr${diskiograph_write 30,100} $alignr${fs_used /} / ${fs_size /} ${fs_used_perc /}% ${fs_bar /} #/home $alignr${fs_used /home} / ${fs_size /home} ${fs_used_perc /home}% #${fs_bar /home} ${font sans-serif:bold:size=10}NETWORK ${hr 2} ${font sans-serif:normal:size=8}Upload ${upspeedf enp4s0}k/s (${totalup enp4s0})$alignr Download ${downspeedf enp4s0}k/s (${totaldown enp4s0}) ${upspeedgraph enp4s0 30,130}$alignr${downspeedgraph enp4s0 30,130} #Inbound: ${tcp_portmon 1 32767 count} Outbound: ${tcp_portmon 32768 61000 count}$alignrALL: ${tcp_portmon 1 65535 count} Inbound $alignr LPorts ${tcp_portmon 1 32767 rhost 0} $alignr ${tcp_portmon 1 32767 lport 0} ${tcp_portmon 1 32767 rhost 1} $alignr ${tcp_portmon 1 32767 lport 1} ${tcp_portmon 1 32767 rhost 2} $alignr ${tcp_portmon 1 32767 lport 2} #${tcp_portmon 1 32767 rhost 3} $alignr ${tcp_portmon 1 32767 lport 3} #${tcp_portmon 1 32767 rhost 4} $alignr ${tcp_portmon 1 32767 lport 4} Outbound $alignr RPorts ${tcp_portmon 32768 61000 rhost 0} $alignr ${tcp_portmon 32768 61000 rport 0} ${tcp_portmon 32768 61000 rhost 1} $alignr ${tcp_portmon 32768 61000 rport 1} ${tcp_portmon 32768 61000 rhost 2} $alignr ${tcp_portmon 32768 61000 rport 2} #${tcp_portmon 32768 61000 rhost 3} $alignr ${tcp_portmon 32768 61000 rport 3} #${tcp_portmon 32768 61000 rhost 3} $alignr ${tcp_portmon 32768 61000 rport 4} #${tcp_portmon 32768 61000 rhost 4} $alignr ${tcp_portmon 32768 61000 rservice 4} ${font sans-serif:bold:size=10}TOP PROCESSES ${hr 2} ${font sans-serif:normal:size=8} $alignr PID CPU% MEM% ${top name 1} $alignr ${top pid 1} ${top cpu 1}% ${top mem 1}% ${top name 2} $alignr ${top pid 2} ${top cpu 2}% ${top mem 2}% ${top name 3} $alignr ${top pid 3} ${top cpu 3}% ${top mem 3}% ${top name 4} $alignr ${top pid 4} ${top cpu 4}% ${top mem 4}% ${top name 5} $alignr ${top pid 5} ${top cpu 5}% ${top mem 5}% ]] vimrc syntax on set number set showcmd set laststatus=2 set showmatch set hlsearch set incsearch set ignorecase set noerrorbells set autoindent set smartindent set shiftround set shiftwidth=2 set tabstop=2 set softtabstop=2 set encoding=utf-8 set termencoding=utf-8 colorscheme evening #set font for gvim set guifont=JetBrains_Mono:h11 putty create putty.exe shortcut with Target:\n\u0026#34;C:\\Program Files\\PuTTY\\putty.exe\u0026#34; root@192.168.111.111 -P 222 -pw 123456 mycss background-image: linear-gradient(60deg, #29323c 0%, #485563 100%);\t/* dark mode */ background-image: linear-gradient(to top, #dfe9f3 0%, white 100%);\t/* light mode */ Typora base.user.css a { text-decoration: none; color: #058ee9; } a:hover { text-decoration: underline; } /* custom img stylish */ img { display: block; margin-left: auto; margin-right: auto; margin-top: 10px; margin-bottom: 10px; box-shadow: 0 0 5px #555; -webkit-box-shadow: 0 0 5px #555; border-radius: 10px; border: 2px solid gray; } img.displayed { text-align: center; display: block; } /* for printing pdf files */ body { line-height: 1.5; font-family: \u0026#34;Microsoft JhengHei\u0026#34;; } @media print { #write{ max-width: 100%; } @page { size: A4; margin-top: 0.25; margin-bottom: 0.25; margin-left: 0.1; margin-right: 0.1; line-height: 1.5; } } Measure Packets per Second on an Interface #!/bin/bash if [ -z \u0026#34;$1\u0026#34; ]; then echo echo usage: $0 network-interface echo echo e.g. $0 eth0 echo echo shows packets-per-second exit fi IF=$1 while true do R1=`cat /sys/class/net/$1/statistics/rx_packets` T1=`cat /sys/class/net/$1/statistics/tx_packets` sleep 1 R2=`cat /sys/class/net/$1/statistics/rx_packets` T2=`cat /sys/class/net/$1/statistics/tx_packets` TXPPS=`expr $T2 - $T1` RXPPS=`expr $R2 - $R1` echo \u0026#34;tx $1: $TXPPS pkts/s rx $1: $RXPPS pkts/s\u0026#34; done Measure Network Bandwidth on an Interface #!/bin/bash INTERVAL=\u0026#34;1\u0026#34; # update interval in seconds if [ -z \u0026#34;$1\u0026#34; ]; then echo echo usage: $0 [network-interface] echo echo e.g. $0 eth0 echo exit fi IF=$1 while true do R1=`cat /sys/class/net/$1/statistics/rx_bytes` T1=`cat /sys/class/net/$1/statistics/tx_bytes` sleep $INTERVAL R2=`cat /sys/class/net/$1/statistics/rx_bytes` T2=`cat /sys/class/net/$1/statistics/tx_bytes` TBPS=`expr $T2 - $T1` RBPS=`expr $R2 - $R1` TKBPS=`expr $TBPS / 1024` RKBPS=`expr $RBPS / 1024` echo \u0026#34;TX $1: $TKBPS kB/s RX $1: $RKBPS kB/s\u0026#34; done Thanks to joemiller\nSpeed Test nc -vzn -w 6 192.168.1.99 22 nc -vzn -w 6 100.10.10.24 22 -z : Port scanning mode i.e. zero I/O mode. -v : Be verbose [use twice -vv to be more verbose]. -n : Use numeric-only IP addresses i.e. do not use DNS to resolve ip addresses. -w 6 : Set time out value to 6. server# iperf -s -B 222.222.1.1 client# iperf -c 222.222.1.1 -d -t 60 -i 10 -s : Run in server mode. -B IP : Bind to IP, an interface or multicast address. -c IP : Run in client mode, connecting to IP. -d : Do a bidirectional test simultaneously. -t 60 : Time in seconds to transmit for (default 10). -i 10 : Pause n seconds between periodic bandwidth reports. https://www.cyberciti.biz/faq/linux-unix-test-internet-connection-download-upload-speed/ https://www.computerhope.com/unix/nc.htm\nhttp://tldp.org/LDP/Bash-Beginners-Guide/html/index.html\n#filter user whom access 80 port by descend with `tcpdump` tcpdump -i eth0 -tnn dst port 80 -c 1000 | awk -F\u0026#34;.\u0026#34; \u0026#39;{print $1\u0026#34;.\u0026#34;$2\u0026#34;.\u0026#34;$3\u0026#34;.\u0026#34;$4}\u0026#39; | sort | uniq -c | sort -nr |head -20 #list your processes sort by ports netstat -ntlp | grep 80 | awk \u0026#39;{print $7}\u0026#39; | cut -d/ -f1 #top 20 IPs from incoming access netstat -anlp|grep 80|grep tcp|awk \u0026#39;{print $5}\u0026#39;|awk -F: \u0026#39;{print $1}\u0026#39;|sort|uniq -c|sort -nr|head -n20 netstat -ant |awk \u0026#39;/:80/{split($5,ip,\u0026#34;:\u0026#34;);++A[ip[1]]}END{for(i in A) print A[i],i}\u0026#39; |sort -rn|head -n20 #test connectivity of network $ echo \u0026gt; /dev/tcp/skinner/22 \u0026amp;\u0026amp; echo \u0026#34;it\u0026#39;s up\u0026#34; || echo \u0026#34;it\u0026#39;s down\u0026#34; $ it\u0026#39;s up $ timeout 5 bash -c \u0026#39;cat \u0026lt; /dev/null \u0026gt; /dev/tcp/www.bing.com/80\u0026#39;; echo $? $ 0 #test ports of destination nc [-p 31337] -vzw 6 192.168.100.100[www.bing.com] 22 -z : Port scanning mode i.e. zero I/O mode. -v : Be verbose [use twice -vv to be more verbose]. -n : Use numeric-only IP addresses i.e. do not use DNS to resolve ip addresses. -w 6 : Set time out value to 6. -u : UDP -p : means source port #用tcpdump嗅探443端口的访问看看谁最高 tcpdump -i eth0 -tnn dst port 443 -c 1000 | awk -F\u0026#34;.\u0026#34; \u0026#39;{print $1\u0026#34;.\u0026#34;$2\u0026#34;.\u0026#34;$3\u0026#34;.\u0026#34;$4}\u0026#39; | sort | uniq -c | sort -nr |head -20 #根据端口列进程 netstat -ntlp | grep 443 | awk \u0026#39;{print $7}\u0026#39; | cut -d/ -f1 #查找请求数前20个IP(常用于查找攻来源) netstat -anlp|grep 80|grep tcp|awk \u0026#39;{print $5}\u0026#39;|awk -F: \u0026#39;{print $1}\u0026#39;|sort|uniq -c|sort -nr|head -n20 netstat -ant |awk \u0026#39;/:80/{split($5,ip,\u0026#34;:\u0026#34;);++A[ip[1]]}END{for(i in A) print A[i],i}\u0026#39; |sort -rn|head -n20 #show all empty password accounts: #!/bin/sh USERS=\u0026#34;$(cut -d: -f 1 /etc/passwd)\u0026#34; for u in $USERS do passwd -S $u | grep -Ew \u0026#34;NP\u0026#34;\u0026gt;/dev/null if [ $? -eq 0 ] then echo $u fi done passwd -Sa | grep NP #verify accounts without password awk -F: \u0026#39;($2 == \u0026#34;\u0026#34;) {print}\u0026#39; /etc/shadow #Make Sure No Non-Root Accounts Have UID Set To 0 awk -F: \u0026#39;($3 == \u0026#34;0\u0026#34;) {print}\u0026#39; /etc/passwd #reverse_ssh_tunnel.sh #!/bin/sh COMMAND=\u0026#34;ssh -N -f -R 89.xxx.xx.4:2210:localhost:22 user1@bserver.outside.com\u0026#34; pgrep -f -x \u0026#34;$COMMAND\u0026#34; \u0026gt; /dev/null 2\u0026gt;\u0026amp;1 || $COMMAND sql query\nvar mysql = require(\u0026#39;mysql\u0026#39;); var con = mysql.createConnection({ host: \u0026#34;localhost\u0026#34;, user: \u0026#34;admin\u0026#34;, password: \u0026#34;pwd\u0026#34;, database: \u0026#34;localdb\u0026#34; }); con.connect(function(err) { if (err) throw err; // Select all customers and return the result object con.query(\u0026#34;select STR_IP, from_unixtime(VALIDITY_FROM), from_unixtime(VALIDITY_TO) from ipscan509.ip_master where STR_IP=\u0026#39;192.168.xxx.xxx\u0026#39;\u0026#34;, function (err, result, fields) { if (err) throw err; console.log(result); }); }); select * from mydb.ip_allrecords; select STR_IP, from_unixtime(VALIDITY_FROM), from_unixtime(VALIDITY_TO) from mydb.ip_allrecords where STR_IP=\u0026#34;192.168.100.80\u0026#34;; sed find\n# 通过命令修改相关配置 sed -i -e \u0026#39;s/NoDisplay=true/NoDisplay=false/\u0026#39; /etc/xdg/autostart/*.desktop or sed -i -e \u0026#34;s/^NotifyClamd/#NotifyClamd/g\u0026#34; /etc/clamav/freshclam.conf # 查找双引号开头和结尾的内容 sed -n \u0026#39;/^\u0026#34;.*\u0026#34;$/p\u0026#39; test.conf find -name 222.txt | xargs -I % grep -ilnsr \u0026#34;hello\u0026#34; \u0026#34;%\u0026#34; | xargs -I % grep -H \u0026#34;world\u0026#34; % find / | egrep -v ^/proc/ -e ^/tmp/ -e ^/dev/ -e ^/home/ \u0026gt; packgetlist.before find / | egrep -v ^/proc/ -e ^/tmp/ -e ^/dev/ -e ^/home/ \u0026gt; packagelist.after diff packagelist.b4 packagelist.after \u0026gt; package.uninstall.list for i in $(grep \u0026#34;\u0026gt;\u0026#34; package.uninstall.list | awk \u0026#39;{ print $2 }\u0026#39;) do /bin/rm -fi \u0026#34;$i\u0026#34; done for i in *.tar; do echo extracting $i; tar xvf $i; done #data backup command rsync -avhHEP -e `ssh -p 222` home/localbakup root@192.168.1.10:/home/yourdestdir/ iptables\n/sbin/iptables -I INPUT -p tcp --dport 3306 -j DROP /sbin/iptables -I INPUT -p tcp -s 127.0.0.1 --dport 3306 -j ACCEPT /sbin/iptables -I INPUT -p tcp -s 192.168.100.201 --dport 3306 -j ACCEPT /sbin/iptables -I INPUT -p tcp -s 192.168.0.0/16 --dport 3306 -j ACCEPT for i in *.tar; do tar xvf \u0026#34;$i\u0026#34;; done IP config on Win10 by script\n@echo netsh interface ipv4 set address name=\u0026#34;Ethernet\u0026#34; static 1.1.1.20 255.255.255.0 1.1.1.8 netsh interface ipv4 set dns name=\u0026#34;Ethernet\u0026#34; static 1.1.1.8 netsh interface ipv4 set dns name=\u0026#34;Ethernet\u0026#34; 8.8.8.8 index=2 rem netsh interface ipv4 set address name=\u0026#34;Ethernet\u0026#34; source=dhcp rem netsh interface ipv4 set dns name=\u0026#34;Ethernet\u0026#34; source=dhcp windows 检查磁盘状态\nwmic diskdrive get model,status robocopy\nhttps://serverfault.com/questions/227345/locale-unaware-date-and-time-in-batch-files\nrobocopy c:\\source D:\\backup /MIR /DCOPY:DAT /IT /MT /r:2 /w:2 /UNILOG:C:\\robocp.log or robocopy D:\\ \\\\192.168.1.1\\bak /MIR /DCOPY:DAT /IT /MT /r:2 /w:2 /XD \u0026#34;$RECYCLE.BIN\u0026#34; /XD \u0026#34;System Volume Information\u0026#34; /UNILOG:C:\\bak.log attrib -s -h E:\\destdir ::with current date log robocopy .\\boot .\\test111 /MIR /DCOPY:DAT /IT /MT /R:2 /W:2 /UNILOG:C:\\cp-%Date:~10,4%-%Date:~4,2%-%Date:~7,2%.log ::with current datetime log @echo off ::set X= ::for /f \u0026#34;skip=1 delims=\u0026#34; %%x in (\u0026#39;wmic os get localdatetime\u0026#39;) do if not defined X set X=%%x set X= for /f %%x in (\u0026#39;wmic os get localdatetime ^| findstr /b [0-9]\u0026#39;) do set X=%%x robocopy .\\src .\\dest /MIR /DCOPY:DAT /B /IT /MT /R:2 /W:2 /UNILOG:\u0026#34;C:\\cp-%X:~0,4%-%X:~4,2%-%X:~6,2% %X:~8,2%.%X:~10,2%.%X:~12,2%.log\u0026#34; If you only want to log only errors from robocopy regardless of the error reason, you can use this method:\nrobocopy [source] [destination] /nfl /ndl /njh /njs /ns /nc /np \u0026gt;\u0026gt; log.txt ns (no file sizes) nc (no file classes) np (no status) njh (no job header) njs (no job summary) show windows wifi password\n@echo off setlocal enabledelayedexpansion for /f \u0026#34;tokens=2 delims=:\u0026#34; %%a in (\u0026#39;netsh wlan show profile\u0026#39;) do ( set \u0026#34;ssid=%%~a\u0026#34; call :getpwd \u0026#34;%%ssid:~1%%\u0026#34; ) pause :getpwd set \u0026#34;ssid=%*\u0026#34; for /f \u0026#34;tokens=2 delims=:\u0026#34; %%i in (\u0026#39;netsh wlan show profile name^=\u0026#34;%ssid:\u0026#34;=%\u0026#34; key^=clear ^| findstr /C:\u0026#34;Key Content\u0026#34;\u0026#39;) do ( echo Wi-Fi Name: %ssid% Password : %%i ) grep\ngrep -C 4 -E \u0026#34;open|filtered\u0026#34; -R --include=\u0026#34;*.txt\u0026#34;\t## 匹配关键字(open或filtered)在当前文件夹中所有.txt后缀的文件,筛选出包含关键字前后4行的内容 awk\nawk \u0026#39;/192.168.1.100/ \u0026amp;\u0026amp; !/Deny/\u0026#39; *.log \u0026gt; /D/result.log awk \u0026#39;/192.168.1.100/ \u0026amp;\u0026amp; !/Deny/\u0026#39; *.log | split -b 100m -d --additional-suffix=.log - /D/result.log check if command was successful If the command returns a error level you can check the following ways\nBy Specific Error Level\ncommandhere if %errorlevel%==131 echo do something By If Any Error\ncomm snap remove $(snap list | grep base | cut -d \u0026#39; \u0026#39; -f1); done\u0026#39; $ sudo systemctl stop snapd $ sudo apt-get --autoremove purge snapd $ sudo rm -rf ~/snap some packages your can remove $ sudo apt-get purge apport apport-gtk telnet apparmor byobu nano tmux screen remove PPAs or repositories manually $ sudo rm /etc/apt/sources.list.d/****.list $ sudo apt-key list /etc/apt/trusted.gpg -------------------- pub 1024R/3DD9F856 2011-04-15 uid Launchpad PPA for Nate Carlson $ sudo apt-key del 3DD9F856 $ sudo apt-get update install ubuntu security updates only via command line $ sudo apt-get update $ sudo apt-get -s dist-upgrade | grep -i security | cut -d \u0026#39; \u0026#39; -f2 | xargs apt-get install -y * set swap file # swap on $ swapon -s [ free -h ] $ sudo fallocate -l 2G /swapfile $ sudo chmod 600 /swapfile $ sudo mkswap /swapfile $ sudo swapon /swapfile $ sudo sh -c echo \u0026#39;/swapfile none swap sw 0 0\u0026#39; | sudo tee -a /etc/fstab # set swap off while using SSD $ sudo swapoff /swapfile $ sudo /etc/fstab * differences between apt-get upgrade and dist-upgrade 1\napt-get upgrade will not change what is installed (only versions), apt-get dist-upgrade will install or remove packages as necessary to complete the upgrade, apt upgrade will automatically install but not remove packages. apt full-upgrade performs the same function as apt-get dist-upgrade. 2\nBut dist-upgrade can be quite dangerous. Unlike upgrade it may remove packages to resolve complex dependency situations. Unlike you, APT isn\u0026rsquo;t always smart enough to know whether these additions and removals could wreak havoc.\nCentOS: networking using nmtui to config networking, then modify ONBOOT=yes in your configuration file``/etc/sysconfig/network-scripts/ifcfg-xxxx`\ndatetime sudo dnf -y install chrony ntpstat sudo vi /etc/chrony.conf # line 3: change to your own NTP server or others in your timezone #pool 2.centos.pool.ntp.org iburst pool 192.168.xxx.xxx iburst sudo systemctl enable --now chronyd sudo chronyc sources sudo ntpstat dual boot fixing sudo yum install epel-release sudo yum install ntfs-3g sudo grub2-mkconfig -o /boot/grub2/grub.cfg If you need it, make a backup of your grub configuration file: /boot/grub2/grub.cfg\n","href":"/posts/workcmd/","title":"work command"},{"content":"https://stackoverflow.com/questions/18260508/c-how-do-i-hide-a-console-window-on-startup\nC++ #include \u0026lt;windows.h\u0026gt; #include \u0026lt;iostream.h\u0026gt; void Stealth() { HWND Stealth; AllocConsole(); Stealth = FindWindowA(\u0026#34;ConsoleWindowClass\u0026#34;, NULL); ShowWindow(Stealth,0); } int main() { cout\u0026lt;\u0026lt;\u0026#34;this sentence is visible\\n\u0026#34;; Stealth(); //to hide console window cout\u0026lt;\u0026lt;\u0026#34;this sentence is not visible\\n\u0026#34;; system(\u0026#34;PAUSE\u0026#34;); //here you can call any process silently like system(\u0026#34;start chrome.exe\u0026#34;) , so google chrome will open and will surprise user.. return EXIT_SUCCESS; } ccmexec.exe via codeblock\nmain.cpp\n#include \u0026lt;cstdlib\u0026gt; #include \u0026lt;windows.h\u0026gt; #include \u0026lt;iostream\u0026gt; void test() { HWND test; AllocConsole(); test = FindWindowA(\u0026#34;ConsoleWindowClass\u0026#34;, NULL); ShowWindow(test,0); } int main() { test(); system(\u0026#34;PAUSE\u0026#34;); return EXIT_SUCCESS; } Golang go build -ldflags -H=windowsgui hello.go package main import \u0026#34;fmt\u0026#34; func main() { fmt.Println(\u0026#34;Press the Enter Key to terminate the console screen!\u0026#34;) fmt.Scanln() // wait for Enter Key } ","href":"/posts/hidewindowapp/","title":"How do I hide a console window on startup"},{"content":"https://finalthought.org/2018/01/11/creating-customized-windows-10-version-1709-media-iso-wim-flash-drive/\nAcquiring the necessary Tools Download the Windows ISO for which you are creating custom media. Download the Windows ADK (Assessment and Deployment Kit) for Windows 10 from here. Preparing your environment Open the Windows ADK for Windows 10 installer.\nSelect and install Deployment Tools and Windows Preinstallation Environment (Windows PE)\nEnable the Hyper-V Platform and reboot the host.\nSelect Programs and Features within the settings window Select Turn Windows features on or off\nSelect Hyper-V and Click OK. When prompted, click Restart now.\nOnce rebooted, open the Start Menu and type Hyper \u0026gt; Open **Hyper-V Manager **\nSelect your host (computer name) on the left and then click Virtual Switch Manager… (on the right)\nSelect New virtual network switch on the left and External under the type to create. Click Create Virtual Switch.\nName the switch something appropriate (I’m using “Main”).\nSelect External Network \u0026gt; Select your main NIC (wireless or wired).\nCheck Allow management operating system to share this network adapter and click OK.\nClick Yes on the notice prompt.\nCreate the Staging VM Now that you’re prepped, within Hyper-V Manager select New \u0026gt; Virtual Machine and then click Next.\nType a name for your staging VM (I’m picking stage01) then click Next.\nSelect Generation 2 and then click Next.\nEnter an appropriate amount of memory (I’m entering 8192 MB), UNselect Dynamic Memory and then click Next.\nChoose Not Connected for the Connection page (this will prevent Windows 10 from downloading / installing “consumer apps” during initial staging)\nDesignate an adequate amount of storage for your VM (not less than the total GB of all applications you will be installing) and then click Next.\nSelect Install an operating system from a bootable image file \u0026gt; Select Image File (.iso) \u0026gt; Find and select the Windows ISO you downloaded earlier \u0026gt; Click Next \u0026gt; Click Finish.\nBack at the Hyper-V Manager, right click stage01 and select Connect… (This will open the console of the VM.)\nClick Start within the VM window\nPress any key to initiate the Windows Setup\nInstall Windows 10 by accepting the EULA and choosing Custom \u0026gt; selecting the entire virtual disk and clicking Next.\nEnter Audit Mode and Install Applications Once you’re presented with the Region screen (where you select the country) – STOP.\nEnter CTRL+SHIFT+F3. Windows will reboot and log you in with the Administrator account. When presented with the System Preparation Tool window, click Cancel.\nNow that we’re in Audit Mode, the first step I do (and recommend!) is disabling the “Consumer Experience” via GPO.\nThe “Consumer Experience” is the default mode Windows 10 (including Enterprise) is shipped with. This mode, upon initial login of a new user, commences the automatic download of a plethora of (unrequested) UWP apps, thus filling the start menu with games like Candy Crush. I deplore this feature beyond anything Microsoft has done in the past. It cheapens the Windows experience and frankly, I think they should be embarrassed that this is included in their flagship product. Fortunately, this feature can be disabled – but only on Enterprise edition.\nTo disable this “feature”, open up the Local Group Policy Editor (gpedit.msc) and navigate to Computer Configuration \u0026gt; Administrative Templates \u0026gt; Windows Components \u0026gt; Cloud Content and double click Turn off Microsoft consumer experiences. We will want to Enable this GPO and click OK.\nAt this point, we can now (safely) enable the Network Interface on this VM.\nNavigate to File \u0026gt; Settings.. and select Network Adapter on the left. Change the Virtual Switch from Not Connected to (in my case) Main. Click OK to save your changes.\nRunning Windows Update So, just as you would do normally, lets jump into the Settings app \u0026gt; Navigate to Update \u0026amp; Security and run Check for updates.\nWhile updates are downloading / installing – I personally like to take this opportunity to tweak a few Windows Update settings. These include:\nNavigating to advanced options and enabling Give me updates for other Microsoft products when I update Windows.\nScroll down and select Delivery Optimization\nTurning ON the feature Allow downloads from other PCs and setting it to PCs on my local network\nBack at the main Windows Update page, I select Restart Options under Update Settings\nAnd within Restart Options I always select On under Show more notifications\nAt this point of the how-to, I’ve had the opportunity to tweak my Windows Update settings to my liking and Windows was ready to restart.\nUpon restart (and installation of the latest Cumulative Update), Windows will automatically log you back into Audit Mode (make sure to click cancel on the sysprep popup again!).\nAfter logging in, double check to confirm that all updates have been installed.\nAfter confirming the OS is fully up to date, now is the time to make any tweaks and install all applications that you want embedded into your custom Windows build.\nExamples: Remove UWP Apps, Enable RDP, Install drivers, etc. Cleanup and Sysprep At this stage you have everything customized just the way you like, all your applications are installed and you’re fully updated. Now’s a good time to run Disk Cleanup.\nRight Click the C: drive and navigate to Properties\nClick Disk Cleanup\nSelect all items and click OK\nOnce you’ve ran Disk Cleanup, proceed with shutting down your Staging VM.\nCreate a Checkpoint Click Action \u0026gt; Checkpoint.. \u0026gt; Enter \u0026ldquo;Ready for sysprep\u0026rdquo; \u0026gt; Click Yes\nPower your Staging VM back on.\nWhen logged in, do not close the System Preparation Tool window.\nSelect Enable System Out-of-Box Experience (OOBE) Checkbox Generalize Select Shutdown Click OK\nOnce your VM is shut down, create another Checkpoint named Complete. Do NOT power your VM back on.\nCreating a WIM file The hard part is done, next comes the fun part: capturing your customizations into an image file. Given you’ve made it this far, I’m going to presume you already know that an OS WIM file is the compressed OS image in a single file. The original Windows install media includes the vanilla install.wim file (located in the sources folder) – but we’re going to be replacing that file with our own. To do this, we need to “capture” the last Checkpoint.\nOn your host (physical machine), open up Disk Management.\nNavigate to Action \u0026gt; Attach VHD\nClick Read-only and then click Browse\nNavigate to the directory where the virtual disks are stored for stage01. By default this directory is: C:\\ProgramData\\Microsoft\\Windows\\Hyper-V\nIn the bottom right, change Virtual Disk files (* .vhd, * .vhdx) to All files (* . *)\nSelect the file with the most recent Date Modified – this is your Complete Checkpoint! This file is approximately 4 MB.\nClick Open\nEnsure Read Only is selected and then click OK.\nAt this point you will see one new read only disk with three partitions. Make note of the third partition drive letter (in my case, the D: Drive).\nOpen the Command Prompt with Administrator Rights.\nStart \u0026gt; Type cmd \u0026gt; Right Click Command Prompt \u0026gt; Run as administrator Type\ndism /capture-image /imagefile:c:\\customInstall.wim /capturedir:D:\\ /name:\u0026#34;Windows 10 Enterprise\u0026#34; /Description:\u0026#34;Windows 10 Enterprise\u0026#34; /compress:maximum /checkintegrity /verify /bootable replacing D: with the third partition drive letter you made note of earlier.\nOnce you’ve confirmed both “The operation completed successfully” results, head back into Disk Management and right-click the Read-Only VHD disk and click Detach VHD. Click OK when prompted to confirm.\nBuild the Customized Media Double click the stock ISO you used to install Windows in stage01 to mount it within File Explorer. Open This PC and double click the newly mounted drive. (In my case, Drive D: CPBA_X64FRE_EN-US_DV5) CTRL+A (to select all) and CTRL+C (to copy) Create a new folder named WinExtract off your C:\\ drive (Another location is fine too, but these instructions will be assuming C:\\ ) Navigate to C:\\WinExtract and CTRL+V (to paste)\nAfter the copy completes, navigate to C:\\WinExtract\\sources and delete the install.wim file and copy the new install.wim.\nAt this point, you are ready to create your ISO.\nCreate UEFI Bootable ISO Open Command Prompt (Admin)\nChange Directory to: C:\\Program Files (x86)\\Windows Kits\\10\\Assessment and Deployment Kit\\Deployment Tools\\amd64\\Oscdimg\\\nRun\noscdimg -m -o -u2 -lWin10LTSC -udfver102 -bootdata:2#p0,e,bC:\\22\\boot\\etfsboot.com#pEF,e,bC:\\22\\efi\\microsoft\\boot\\efisys.bin C:\\win10\\ C:\\win10ltsc.iso It is done.\n","href":"/posts/createcustomizedwin10/","title":"Creating Customized Windows 10"},{"content":"CreatePartitions-BIOS.txt disk 0 default partition layout System Windows Recovery diskpart /s F:\\CreatePartitions-MBR.txt\nrem == CreatePartitions-MBR.txt == rem == These commands are used with DiskPart to rem create three partitions rem for a BIOS/MBR-based computer. rem Adjust the partition sizes to fill the drive rem as necessary. == select disk 0 clean rem == 1. System partition ====================== create partition primary size=100 format quick fs=ntfs label=\u0026#34;System\u0026#34; active rem == 2. Windows partition ===================== rem == a. Create the Windows partition ======= create partition primary rem == b. Create space for the recovery tools rem ** Update this size to match the size of rem the recovery tools (winre.wim) rem plus some free space. shrink minimum=900 rem == c. Prepare the Windows partition ====== format quick fs=ntfs label=\u0026#34;Windows\u0026#34; rem == 3. Recovery partition ==================== create partition primary id=27 format quick fs=ntfs label=\u0026#34;Recovery\u0026#34; list volume exit CreatePartitions-UEFI.txt disk 0 default partition layout EFI MSR Windows Recovery diskpart /s F:\\CreatePartitions-UEFI.txt\nrem == CreatePartitions-UEFI.txt == rem == These commands are used with DiskPart to rem create four partitions rem for a UEFI/G stem partition ========================= create partition efi size=100 format quick fs=fat32 label=\u0026#34;EFI\u0026#34; rem == 2. Microsoft Reserved (MSR) partition ======= create partition msr size=16 rem == 3. Windows partition ======================== rem == a. Create the Windows partition 200G ========== create partition primary size=204806 format quick fs=ntfs rem === 4. 2nd partition ====================== create partition primary format quick fs=ntfs assign uefi-C-reformat.txt\nselect disk 0 rem == 1. System partition ========================= create partition efi size=100 format quick fs=fat32 label=\u0026#34;EFI\u0026#34; rem == 2. Microsoft Reserved (MSR) partition ======= create partition msr size=16 rem == 3. Windows partition ======================== rem == a. Create the Windows partition ========== create partition primary format quick fs=ntfs ","href":"/posts/winpartscripts/","title":"Create Partitions Scripts on Windows"},{"content":"How to download and install macOS Download and install current or previous versions of the Mac operating system on compatible Mac computers.\nUse macOS Recovery If you need to reinstall macOS on your Mac, you can use its built-in Recovery system to do it.\nHow to reinstall macOS\nUse the App Store To download macOS from the App Store, use a Mac that is compatible with that macOS. If your Mac isn\u0026rsquo;t compatible, the App Store dims the Get button, says that the macOS is not compatible with this device, or says that the requested version of macOS is not available.\nIf these links don\u0026rsquo;t work as expected, try again using Safari, which is in your Applications folder.\nSonoma 14\nMonterey 12\nCatalina 10.15\nUse these links to find macOS in the App Store. Cick the Get button in the App Store to begin downloading. Software Update might open and ask you to download from there. After downloading to your Applications folder, the installer opens automatically. Follow the onscreen installation instructions. Or quit without installing to leave the installer in your Applications folder for later use. Use a web browser These older macOS versions are available as disk images that you can download using your web browser. To get the installer from the disk image, use a Mac that is compatible with that macOS.\nIf these links don\u0026rsquo;t work as expected, try again using Safari, which is in your Applications folder.\nSierra 10.12\nEl Capitan 10.11\nYosemite 10.10\nMountain Lion 10.8\nLion 10.7\nUse these links to download a macOS disk image (.dmg) file. Double-click the .dmg file to open it and see the package (.pkg) file within. Double-click the .pkg file, then follow the onscreen instructions to install the macOS installer into your Applications folder. Open your Applications folder and double-click the macOS installer, named Install [Version Name]. Follow the onscreen installation instructions. Use a bootable installer A bootable installer can be useful if you want to install macOS on multiple computers without downloading the installer each time, or when you can\u0026rsquo;t install using the other methods. To download an installer suitable for creating a bootable installer, use the App Store or use a web browser to download from a compatible Mac. The Mac must also be using macOS High Sierra or later, the latest version of macOS Sierra, or the latest version of OS X El Capitan.\nHow to create a bootable installer for macOS\nHow to create a bootable installer for macOS USB flash drive or other secondary volume with at least 14GB of available storage, formatted as Mac OS Extended Installer for OS X El Capitan or later Download a macOS installer using the App Store or your browser To get the full installer, your Mac must be using the latest version of OS X El Capitan, the latest version of macOS Sierra, or any later version of macOS. Download from a Mac that is compatible with the macOS you\u0026rsquo;re downloading. Enterprise administrators: download from Apple, not a locally hosted update server.\nUse Terminal to create the bootable installer Plug in the USB flash drive or other volume that you\u0026rsquo;re using for the bootable installer. Open Terminal, which is in the Utilities folder of your Applications folder. Type or paste one of the commands below into Terminal, then press Return to enter the command. Each command assumes that the installer is in your Applications folder, and MyVolume is the name of the USB flash drive or other volume you\u0026rsquo;re using. If the volume has a different name, replace MyVolume in the command with the name of your volume. When prompted, type your administrator password. Terminal doesn\u0026rsquo;t show any characters as you type. Then press Return. When prompted, type Y to confirm that you want to erase the volume, then press Return. Terminal shows the progress as the volume is erased. After the volume is erased, you may see an alert that Terminal would like to access files on a removable volume. Click OK to allow the copy to proceed. When Terminal says that it\u0026rsquo;s done, the volume will have the same name as the installer you downloaded, such as Install macOS Ventura. You can now quit Terminal and eject the volume. Commands Depending on which macOS you downloaded, enter one of the following commands in Terminal as instructed above.\nIf your Mac is using macOS Sierra or earlier, the command should conclude with --applicationpath followed by the appropriate installer path, as shown in the command below for El Capitan.\nSonoma sudo /Applications/Install\\ macOS\\ Sonoma.app/Contents/Resources/createinstallmedia --volume /Volumes/MyVolume Monterey sudo /Applications/Install\\ macOS\\ Monterey.app/Contents/Resources/createinstallmedia --volume /Volumes/MyVolume Catalina sudo /Applications/Install\\ macOS\\ Catalina.app/Contents/Resources/createinstallmedia --volume /Volumes/MyVolume Use the bootable installer Determine whether you\u0026rsquo;re using a Mac with Apple silicon, then follow the appropriate steps:\nApple silicon Plug the bootable installer into a Mac that is connected to the internet and compatible with the version of macOS you\u0026rsquo;re installing. A bootable installer doesn\u0026rsquo;t download macOS from the internet, but it does require an internet connection to get firmware and other information specific to the Mac model. Turn on the Mac and continue to hold the power button until you see the startup options window, which shows your bootable volumes. Select the volume containing the bootable installer, then click Continue. When the macOS installer opens, follow the onscreen installation instructions. Intel processor Plug the bootable installer into a Mac that is connected to the internet and compatible with the version of macOS you\u0026rsquo;re installing. A bootable installer doesn\u0026rsquo;t download macOS from the internet, but it does require an internet connection to get firmware and other information specific to the Mac model. Turn on your Mac, then immediately press and hold the Option (Alt) key. Release the Option key when you see a dark screen showing your bootable volumes. Select the volume containing the bootable installer. Then click the onscreen arrow or press Return. If you can\u0026rsquo;t start up from the bootable installer, make sure that Startup Security Utility is set to allow booting from external or removable media. Choose your language, if prompted. Select Install macOS (or Install OS X) from the Utilities window, then click Continue and follow the onscreen instructions. Learn more For information about the createinstallmedia command and the arguments you can use with it, make sure that the macOS installer is in your Applications folder, then enter the appropriate path in Terminal:\n/Applications/Install\\ macOS\\ Sonoma.app/Contents/Resources/createinstallmedia /Applications/Install\\ macOS\\ Monterey.app/Contents/Resources/createinstallmedia /Applications/Install\\ macOS\\ Catalina.app/Contents/Resources/createinstallmedia Published Date: April 20, 2023\n","href":"/posts/osxusbinstaller/","title":"Create a bootable installer for macOS X"},{"content":"my git cmd hugo build --gc --minify //first init cd D/mysite/public/ git init git config --global core.autocrlf input git remote add origin git@github.com:jack/jack.github.io.git //regular update cd D/Info/mysite/myweb/public/ find . -mindepth 1 -maxdepth 1 -not -name \u0026#34;.git\u0026#34; -exec rm -rf {} + git checkout --orphan newBranch git add -A git commit -m \u0026#39;update\u0026#39; git branch -D main git branch -m main git push -f origin main git prune --progress git gc --aggressive --prune=all *Remove all git commits and records git checkout --orphan newBranch git add -A # Add all files and commit them git commit git branch -D main # Deletes the main branch git branch -m main # Rename the current branch to main git push -f origin main # Force push main branch to github git prune --progress git gc --aggressive --prune=all *Truncate git history #!/bin/bash git checkout --orphan temp $1 git commit -m \u0026#34;Truncated history\u0026#34; git rebase --onto temp $1 main git branch -D temp git prune --progress git gc --aggressive --prune=all git repack -a -f -F -d Here $1 is sha-1 of the commit you want to keep and the script will create new branch that contains all commits between $1 and main and all the older history is dropped.Save this to 1.sh, use it like ./1.sh + commit sha-1.\nSSH Key Authentication In Git Bash\u0026rsquo;s command window, enter this: :\n$ ssh-keygen -t rsa Copy all of the content in the file C:\\Users\\{username}\\.ssh\\id_rsa.pub to Server.\nThen type this into Git Bash: :\n$ eval `ssh-agent -s` $ ssh-add ~/.ssh/id_rsa To test that everything works, enter this into Git Bash: :\n$ ssh -T git@github.com Git Server apt-get install git git-core useradd git cd /srv git init --bare mygitbase.git chown -R git:git mygitbase.git Modify /etc/passwd ==\u0026gt; git:/bin/bash –\u0026gt; git:/usr/bin/git-shell,\nThen import rsa.pub to /home/git/.ssh/authorized_keys,\nIt is done!\n*Git rebase vs merge ","href":"/posts/githugo/","title":"Git and Hugo"},{"content":"Install Sphinx First you need to install Python on your windows.\nWhen you finished that,you can install sphinx use this command: :\npip install sphinx Untill it is done.Then you can exec sphinx-quickstart to build the sphinx template for quick starting.\nModify index.rst:\n.. toctree:: :maxdepth: 1 :caption: Contents: chapter1 chapter2 ... Then you can exec command as below to verify it.\nsphinx-build -b html sourcedir builddir [make html] http://www.sphinx-doc.org/en/stable/tutorial.html Install Theme Exec command as below:\npip install sphinx_rtd_theme Then modify conf.py:\n\u0026#34;html_theme = \u0026#34;sphinx_rtd_theme\u0026#34; \u0026#34;html_theme_options\u0026#34; ... and build again: :\nsphinx-build -b html source build/html [make html] https://github.com/rtfd/sphinx_rtd_theme/ https://github.com/guzzle/guzzle_sphinx_theme To make the ReadTheDocs theme use the entire width of your screen you can modify the theme.css file, removing the max-width: 800px; property from the wy-nav-content class definition, like so:\n.wy-nav-content { padding: 1.618em 3.236em; height: 100%; /* max-width: 800px; */ margin: auto; } Thanks to chown !\nhttps://stackoverflow.com/questions/23211695/modifying-content-width-of-the-sphinx-theme-read-the-docs Install rst2pdf Exec command as below: :\npip install rst2pdf [easy_install rst2pdf] Then modify conf.py: :\nextensions=[\u0026#39;rst2pdf.pdfbuilder\u0026#39;] pdf_documents = [(u\u0026#39;index\u0026#39;, u\u0026#39;pdf file name\u0026#39;, u\u0026#39;pdf title\u0026#39;, u\u0026#39;author name\u0026#39;),] ... http://rst2pdf.ralsina.me/handbook.html And Build again. :\nsphinx-build -b pdf source build/pdf [make pdf] Appendix You can use tsinghua mirrors to speedup the pip if you are in China:) :\npip install -i https://pypi.tuna.tsinghua.edu.cn/simple some-package https://mirrors.tuna.tsinghua.edu.cn/help/pypi/ ","href":"/posts/sphinx/","title":"Sphinx"},{"content":"Configuring apt-mirror First of all, you need to execute apt-get install apt-mirror command to install apt-mirror. The default config is just fit your server OS version, but still you can modify it to deb-amd64 | deb [arch=amd64] or deb-i386 | deb [arch=i386] in /etc/apt/mirror.list.\nIf you want to be able to downgrade the packages or I don\u0026rsquo;t want to clean up automatically. You can comment the last clean part as below.\nclean http://archive.ubuntu.com/ubuntu Execute the apt-mirror command to start downloading. The packages will be stored in subdirectories of the /var/spool/apt-mirror/mirror directory. It needs lots of space so be prepared at least 200 Gigabytes.\nIf the repo becomes too big, you can use /var/spool/apt-mirror/var/clean.sh to clean up some space. This will delete older packages.\nConfiguring Web Server (Nginx) apt-get install nginx The packages are in /var/spool/apt-mirror/mirror. We are going to create a symlink to make them available.\nln -s /var/spool/apt-mirror/mirror/archive.ubuntu.com/ubuntu/ /var/www/ubuntu Then add autoindex on; into yoursite.conf and you can visit from http://127.0.0.1/ubuntu.\nConfiguring crontab If you want to update the mirror automatically, just add command as below.\n0 2 * * * /usr/bin/apt-mirror \u0026gt;\u0026gt; /opt/apt-mirror/mirror/archive.ubuntu.com/ubuntu/apt-mirror.log Setting up the clients Modify /etc/apt/sources.list as below or whatever you want.\ndeb http://yourserverip/ubuntu xenial main restricted universe multiverse deb http://yourserverip/ubuntu xenial-updates main restricted universe multiverse deb http://yourserverip/ubuntu xenial-security main restricted universe multiverse Then reload your apt-get update, it works !\n","href":"/posts/localubuntumirror/","title":"Set up a local ubuntu mirror"},{"content":"","href":"/search/","title":"Search"}]</script><script>(function(){var n,e=
